name: Prepare smartctl 7.5 (Windows x86_64)

# Run manually by a maintainer when smartmontools needs to be updated.
# Creates / updates the GitHub Release tag tools/smartctl-7.5-win64 with a
# zip containing just smartctl.exe extracted from the official smartmontools
# Windows 64-bit installer package from SourceForge.
on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/prepare-smartctl-windows.yml'

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  prepare:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download smartmontools 7.5 Windows installer
        # curl -L follows SourceForge's multi-hop redirect reliably;
        # Invoke-WebRequest can land on the HTML interstitial page instead.
        run: |
          curl -fsSL -o smartmontools-setup.exe `
            "https://downloads.sourceforge.net/project/smartmontools/smartmontools/7.5/smartmontools-7.5.win32-setup.exe"
          $size = (Get-Item smartmontools-setup.exe).Length
          Write-Host "Downloaded $size bytes"
          if ($size -lt 500000) {
            Write-Error "Download too small ($size bytes) — likely an HTML redirect page, not the installer"
            exit 1
          }
        shell: pwsh

      - name: List installer contents (debug)
        # Non-fatal — just prints what's inside so failures are easier to diagnose.
        run: |
          7z l -tNSIS smartmontools-setup.exe 2>&1 | Select-String -Pattern "smartctl|\.exe" -CaseSensitive:$false
          exit 0
        shell: pwsh

      - name: Extract smartctl.exe from installer
        # The NSIS installer uses a solid LZMA archive — 7-Zip cannot filter
        # by filename on solid archives ("No files to process" if you try).
        # Extract everything first with 7z x, then pick out smartctl.exe.
        run: |
          New-Item -ItemType Directory -Force -Path staging\all    | Out-Null
          New-Item -ItemType Directory -Force -Path staging\smartctl | Out-Null
          7z x -tNSIS smartmontools-setup.exe -o"staging\all" -y
          $exe = Get-ChildItem -Recurse -Filter "smartctl.exe" -Path "staging\all" |
                   Select-Object -First 1
          if (-not $exe) {
            Write-Error "smartctl.exe was not found in the extracted installer contents"
            exit 1
          }
          Write-Host "Found: $($exe.FullName)"
          Copy-Item $exe.FullName "staging\smartctl\smartctl.exe"
        shell: pwsh

      - name: Verify binary
        run: |
          $ver = & "staging\smartctl\smartctl.exe" --version 2>&1 | Select-Object -First 1
          Write-Host "Extracted: $ver"
        shell: pwsh

      - name: Package as zip and compute SHA-256
        run: |
          Compress-Archive -Path staging\smartctl -DestinationPath smartctl-7.5-windows-x86_64.zip -Force
          $hash = (Get-FileHash smartctl-7.5-windows-x86_64.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  smartctl-7.5-windows-x86_64.zip" | Out-File -Encoding ascii smartctl-7.5-windows-x86_64.zip.sha256
          Write-Host "SHA-256: $hash"
        shell: pwsh

      - name: Publish GitHub Release
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete the tag/release if it already exists so we can re-run cleanly.
          gh release delete tools/smartctl-7.5-win64 --yes 2>$null || true
          git tag -d tools/smartctl-7.5-win64 2>$null || true

          gh release create tools/smartctl-7.5-win64 `
            --title "smartctl 7.5 (Windows x86_64)" `
            --notes "smartctl.exe extracted from the official smartmontools 7.5 Windows 64-bit installer.

          **Source:** smartmontools-7.5-1.win32-setup.exe (SourceForge)
          **Arch:** x86_64 (64-bit Windows)

          SHA-256 of the zip is in the accompanying .sha256 file." `
            smartctl-7.5-windows-x86_64.zip `
            smartctl-7.5-windows-x86_64.zip.sha256
        shell: pwsh
