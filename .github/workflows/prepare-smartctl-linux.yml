name: Prepare smartctl 7.5 (Linux x86_64)

# Run manually by a maintainer when smartmontools needs to be updated.
# Creates / updates the GitHub Release tag tools/smartctl-7.5 with a fresh
# tar.gz containing just the smartctl binary extracted from the official
# Ubuntu 25.04 (Plucky) amd64 package.
on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/prepare-smartctl-linux.yml'

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  prepare:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build smartctl 7.5 from source (glibc 2.35 / Ubuntu 22.04 target)
        # Build inside ubuntu:22.04 so the resulting binary links against
        # glibc 2.35 — the lowest version we support.  A binary built against
        # glibc 2.35 runs on Ubuntu 22.04, 24.04 and 25.04 without issues.
        # Extracting from ubuntu:25.04 would produce a binary requiring glibc
        # 2.38, which breaks on 22.04 installs.
        run: |
          docker run --rm -v "$PWD/staging:/out" ubuntu:22.04 bash -c '
            set -e
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq
            apt-get install -y --no-install-recommends \
              build-essential curl ca-certificates libcap-ng-dev

            curl -fsSL -o /tmp/smartmontools.tar.gz \
              "https://downloads.sourceforge.net/project/smartmontools/smartmontools/7.5/smartmontools-7.5.tar.gz"

            tar -xzf /tmp/smartmontools.tar.gz -C /tmp
            cd /tmp/smartmontools-7.5

            # Disable systemd journal integration to keep dependencies minimal
            ./configure \
              --prefix=/usr \
              --without-systemdsystemunitdir \
              --without-libsystemd \
              CXXFLAGS="-O2"

            make -j$(nproc) smartctl

            mkdir -p /out/smartctl
            cp smartctl /out/smartctl/smartctl
            chmod 755 /out/smartctl/smartctl
            echo "Built: $(/out/smartctl/smartctl --version | head -1)"
          '

      - name: Verify binary
        run: |
          file staging/smartctl/smartctl
          staging/smartctl/smartctl --version || true   # exits non-zero without root, that is expected

      - name: Package as tar.gz
        run: |
          tar -czf smartctl-7.5-linux-x86_64.tar.gz -C staging smartctl
          sha256sum smartctl-7.5-linux-x86_64.tar.gz | tee smartctl-7.5-linux-x86_64.tar.gz.sha256

      - name: Publish GitHub Release
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete the tag/release if it already exists so we can re-run cleanly.
          gh release delete tools/smartctl-7.5 --yes 2>/dev/null || true
          git tag -d tools/smartctl-7.5 2>/dev/null || true

          gh release create tools/smartctl-7.5 \
            --title "smartctl 7.5 (Linux x86_64)" \
            --notes "$(cat <<'EOF'
          smartctl binary extracted from the official Ubuntu 25.04 (Plucky) amd64 package.

          **Source:** ubuntu:25.04 Docker image — smartmontools package
          **Arch:** x86_64 (amd64)
          **Linked against:** glibc / libstdc++ (always present on Ubuntu)

          SHA-256 of the tar.gz is in the accompanying .sha256 file.
          EOF
          )" \
            smartctl-7.5-linux-x86_64.tar.gz \
            smartctl-7.5-linux-x86_64.tar.gz.sha256
