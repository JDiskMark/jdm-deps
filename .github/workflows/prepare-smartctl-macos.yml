name: Prepare smartctl 7.5 (macOS)

# Run manually by a maintainer when smartmontools needs to be updated.
# Creates / updates two GitHub Releases:
#   - tools/smartctl-7.5-macos-arm64   (Apple Silicon)
#   - tools/smartctl-7.5-macos-x86_64  (Intel)
# Each release contains a tar.gz with the smartctl binary extracted from the
# official smartmontools 7.5 macOS DMG (which ships a universal binary).
on:
  workflow_dispatch:

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  prepare:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download smartmontools 7.5 DMG
        run: |
          curl -fsSL -o /tmp/smartmontools.dmg \
            "https://downloads.sourceforge.net/project/smartmontools/smartmontools/7.5/smartmontools-7.5.dmg"
          SIZE=$(stat -f%z /tmp/smartmontools.dmg)
          echo "Downloaded $SIZE bytes"
          if [ "$SIZE" -lt 500000 ]; then
            echo "::error::Download too small ($SIZE bytes) — likely an HTML redirect page, not the DMG"
            exit 1
          fi

      - name: Mount DMG and extract smartctl
        run: |
          set -e
          MOUNT_POINT=$(hdiutil attach /tmp/smartmontools.dmg -nobrowse -noverify -readonly | \
            grep '/Volumes/' | awk -F'\t' '{print $NF}')
          echo "Mounted at: $MOUNT_POINT"

          # The DMG contains a .pkg installer.  Use pkgutil to expand it.
          PKG=$(find "$MOUNT_POINT" -name '*.pkg' -maxdepth 1 | head -1)
          if [ -z "$PKG" ]; then
            echo "::error::No .pkg found in DMG.  Contents:"
            ls -la "$MOUNT_POINT"
            exit 1
          fi
          echo "Found package: $PKG"

          pkgutil --expand "$PKG" /tmp/smartmontools-pkg

          # List payload contents for debugging
          echo "=== Package contents ==="
          ls -R /tmp/smartmontools-pkg/ || true

          # Extract the Payload (may be a cpio archive, possibly gzipped)
          mkdir -p /tmp/smartmontools-extracted
          PAYLOAD=$(find /tmp/smartmontools-pkg -name 'Payload' | head -1)
          if [ -z "$PAYLOAD" ]; then
            echo "::error::No Payload found in expanded package"
            exit 1
          fi
          cd /tmp/smartmontools-extracted
          # Payload is typically a gzipped cpio archive
          cat "$PAYLOAD" | gunzip -f 2>/dev/null | cpio -id 2>/dev/null || \
          cat "$PAYLOAD" | cpio -id 2>/dev/null || true

          SMARTCTL=$(find /tmp/smartmontools-extracted -name 'smartctl' -type f | head -1)
          if [ -z "$SMARTCTL" ]; then
            echo "::error::smartctl binary not found in extracted payload.  Contents:"
            find /tmp/smartmontools-extracted -type f
            exit 1
          fi
          echo "Found smartctl: $SMARTCTL"

          # Verify it is a universal binary
          file "$SMARTCTL"
          lipo -info "$SMARTCTL"

          hdiutil detach "$MOUNT_POINT" || true

          # Store path for later steps
          echo "SMARTCTL_PATH=$SMARTCTL" >> "$GITHUB_ENV"

      - name: Produce per-architecture binaries
        run: |
          set -e
          for ARCH in arm64 x86_64; do
            mkdir -p "staging-${ARCH}/smartctl"
            lipo "$SMARTCTL_PATH" -extract "$ARCH" -output "staging-${ARCH}/smartctl/smartctl"
            chmod 755 "staging-${ARCH}/smartctl/smartctl"
            echo "=== ${ARCH} ==="
            file "staging-${ARCH}/smartctl/smartctl"
            "staging-${ARCH}/smartctl/smartctl" --version | head -1 || true
          done

      - name: Package as tar.gz
        run: |
          for ARCH in arm64 x86_64; do
            ASSET="smartctl-7.5-macos-${ARCH}"
            tar -czf "${ASSET}.tar.gz" -C "staging-${ARCH}" smartctl
            shasum -a 256 "${ASSET}.tar.gz" | tee "${ASSET}.tar.gz.sha256"
          done

      - name: Publish GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for ARCH in arm64 x86_64; do
            ASSET="smartctl-7.5-macos-${ARCH}"
            TAG="tools/smartctl-7.5-macos-${ARCH}"

            # Delete the tag/release if it already exists so we can re-run cleanly.
            gh release delete "$TAG" --yes 2>/dev/null || true
            git tag -d "$TAG" 2>/dev/null || true

            if [ "$ARCH" = "arm64" ]; then
              TITLE="smartctl 7.5 (macOS Apple Silicon)"
            else
              TITLE="smartctl 7.5 (macOS Intel)"
            fi

            gh release create "$TAG" \
              --title "$TITLE" \
              --notes "smartctl binary extracted from the official smartmontools 7.5 macOS DMG.

          **Source:** smartmontools-7.5.dmg (SourceForge)
          **Arch:** ${ARCH}

          SHA-256 of the tar.gz is in the accompanying .sha256 file." \
              "${ASSET}.tar.gz" \
              "${ASSET}.tar.gz.sha256"
          done
